<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <title>ChemVibe - Laboratorium Virtual Kimia</title>
    <!-- PWA Meta tags -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Dashboard interaktif dan laboratorium virtual kimia digital" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Apple iOS Safari Support -->
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ChemVibe" />
  </head>
  <body class="bg-slate-950 text-slate-100 selection:bg-teal-500/30 selection:text-teal-300">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('ChemVibe Service Worker terdaftar dengan sukses! Scope:', reg.scope);
            })
            .catch((err) => {
              console.error('Pendaftaran Service Worker ChemVibe gagal:', err);
            });
        });
      }
    </script>
  </body>
</html>
