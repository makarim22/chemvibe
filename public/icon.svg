<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    <!-- Neon Teal Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <!-- Liquid / Accent Gradient -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
  </defs>

  <!-- Dark Slate Backdrop Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="4" />
  
  <!-- Outer Orbit Ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="8,6" />
  
  <!-- Neon Orbit Rings (Rotated x & y) -->
  <g filter="url(#glow)">
    <!-- Diagonal ellipse orbit 1 -->
    <ellipse cx="256" cy="256" rx="160" ry="60" fill="none" stroke="url(#primaryGrad)" stroke-width="4" transform="rotate(30, 256, 256)" opacity="0.85" />
    <!-- Diagonal ellipse orbit 2 -->
    <ellipse cx="256" cy="256" rx="160" ry="60" fill="none" stroke="url(#secondaryGrad)" stroke-width="4" transform="rotate(-30, 256, 256)" opacity="0.85" />
  </g>

  <!-- Orbital Particles (Electrons) -->
  <!-- Electron 1 -->
  <circle cx="118" cy="176" r="9" fill="#2dd4bf" filter="url(#glow)" />
  <!-- Electron 2 -->
  <circle cx="394" cy="176" r="9" fill="#3b82f6" filter="url(#glow)" />
  <!-- Electron 3 -->
  <circle cx="256" cy="416" r="7" fill="#6366f1" filter="url(#glow)" />

  <!-- Center Beaker/Flask Silhouette overlapping double atoms -->
  <g filter="url(#glow)">
    <!-- Flask Outline -->
    <path d="M226,110 L286,110 M256,110 L256,140 M240,140 L272,140 M240,140 L210,320 A60,60 0 0,0 302,320 L272,140" fill="none" stroke="#e2e8f0" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Styled Wave of reactive liquid inside flask -->
    <path d="M214,290 C230,300 240,280 256,290 C272,300 282,280 298,290 L294,310 A48,48 0 0,1 218,310 Z" fill="url(#primaryGrad)" opacity="0.85" />
    
    <!-- Central Atom nucleus sphere inside the flask solution -->
    <circle cx="256" cy="256" r="16" fill="#2dd4bf" stroke="#ffffff" stroke-width="2" />
    <circle cx="244" cy="246" r="10" fill="#3b82f6" />
    <circle cx="268" cy="248" r="8" fill="#6366f1" />
  </g>
  
  <!-- Subtle reflection/highlight glisten on flask glass -->
  <path d="M219,305 A50,50 0 0,1 213,280" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.5" />
</svg>
